<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0f0a"/>

  <!-- Hippo body -->
  <ellipse cx="32" cy="38" rx="18" ry="14" fill="#22c55e"/>

  <!-- Hippo head -->
  <ellipse cx="32" cy="24" rx="14" ry="12" fill="#22c55e"/>

  <!-- Snout / muzzle -->
  <ellipse cx="32" cy="30" rx="9" ry="6" fill="#16a34a"/>

  <!-- Nostrils -->
  <ellipse cx="29" cy="29" rx="2" ry="1.5" fill="#0a0f0a"/>
  <ellipse cx="35" cy="29" rx="2" ry="1.5" fill="#0a0f0a"/>

  <!-- Eyes -->
  <ellipse cx="25" cy="20" rx="3.5" ry="3.5" fill="#0a0f0a"/>
  <ellipse cx="39" cy="20" rx="3.5" ry="3.5" fill="#0a0f0a"/>
  <!-- Eye shine -->
  <circle cx="26" cy="19" r="1" fill="#4ade80"/>
  <circle cx="40" cy="19" r="1" fill="#4ade80"/>

  <!-- Ears -->
  <ellipse cx="18" cy="14" rx="5" ry="4" fill="#22c55e"/>
  <ellipse cx="18" cy="14" rx="3" ry="2.5" fill="#16a34a"/>
  <ellipse cx="46" cy="14" rx="5" ry="4" fill="#22c55e"/>
  <ellipse cx="46" cy="14" rx="3" ry="2.5" fill="#16a34a"/>

  <!-- Legs -->
  <rect x="16" y="48" width="8" height="10" rx="4" fill="#16a34a"/>
  <rect x="26" y="49" width="8" height="9" rx="4" fill="#16a34a"/>
  <rect x="36" y="49" width="8" height="9" rx="4" fill="#16a34a"/>
  <rect x="42" y="48" width="8" height="10" rx="4" fill="#16a34a"/>

  <!-- Tiny tail -->
  <path d="M50 36 Q56 34 54 30" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
